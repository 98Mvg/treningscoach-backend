name: Codebase Guide Sync

on:
  pull_request:
    paths:
      - "CODEBASE_GUIDE.md"
      - "README.md"
      - "scripts/generate_codebase_guide.py"
      - "scripts/release_check.sh"
      - "tests_phaseb/test_codebase_guide_sync.py"
      - "tests_phaseb/test_root_runtime_source_of_truth.py"
      - ".github/workflows/codebase-guide-sync.yml"
      - "main.py"
      - "auth.py"
      - "auth_routes.py"
      - "brain_router.py"
      - "chat_routes.py"
      - "web_routes.py"
      - "zone_event_motor.py"
      - "session_manager.py"
      - "database.py"
      - "TreningsCoach/**"
  push:
    branches:
      - main
    paths:
      - "CODEBASE_GUIDE.md"
      - "README.md"
      - "scripts/generate_codebase_guide.py"
      - "scripts/release_check.sh"
      - "tests_phaseb/test_codebase_guide_sync.py"
      - "tests_phaseb/test_root_runtime_source_of_truth.py"
      - ".github/workflows/codebase-guide-sync.yml"
      - "main.py"
      - "auth.py"
      - "auth_routes.py"
      - "brain_router.py"
      - "chat_routes.py"
      - "web_routes.py"
      - "zone_event_motor.py"
      - "session_manager.py"
      - "database.py"
      - "TreningsCoach/**"

jobs:
  verify-codebase-guide:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Verify generated guide is in sync
        run: python scripts/generate_codebase_guide.py --check

      - name: Run source-of-truth contract tests
        run: |
          pytest -q \
            tests_phaseb/test_codebase_guide_sync.py \
            tests_phaseb/test_codebase_guide_ci_contract.py \
            tests_phaseb/test_root_runtime_source_of_truth.py
