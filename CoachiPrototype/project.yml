name: Coachi
options:
  bundleIdPrefix: com.coachi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: "5.9"

targets:
  Coachi:
    type: application
    platform: iOS
    sources:
      - Coachi
    settings:
      base:
        INFOPLIST_FILE: Coachi/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.coachi.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
